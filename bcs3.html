	html {

	}

	}
	.keys {
	display: flex;
	flex: 1;
	min-height:100%;
	align-items: center;
	justify-content: center;
	}
	
	.key {
	border: 4px solid teal;
	border-radius: 55px;
	margin: 1rem;
	font-size: 1.9rem;
	padding: 1rem 0.5rem;
	transition: all 0.2s;
	width: 330px;
	text-align: center;
	color: red;
	background: rgba(200,220,00,.1);
	/* background: rgba(0,0,0,0.4); */
	text-shadow: 12 20 5px orrange;
	}
	
	.playing {
	transform: scale(1.1);
	border-color: #ffc600;
	box-shadow: 0 0 1px #ffc600;
	}
	
	kbd {
	display: block;
	font-size: 40px;
	}
	.sound {
	font-size: 1.2rem;
	text-transform: uppercase;
	letter-spacing: 1px;
	color: white;
	}
	@media (max-width: 700px) {
	.keys {
	display: grid;
	grid-template-columns: 1fr  ;
	grid-template-rows: ;
	grid-gap: 10px;
	justify-items: center;
	}
	}
	@media (min-width: 700px) {
	.keys {
	display: grid;
	grid-template-columns: 1fr 1fr 1fr;
	grid-template-rows: 1fr 1fr 1fr;
	grid-gap: 10px;
	justify-items: center;
	}
	.key {
	display: flex;
	align-items: center;
	justify-content: center;
	}
	}
